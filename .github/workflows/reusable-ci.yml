# Reusable CI pipeline for running the test suite across PHP versions
# Called by ci.yml via workflow_call. Spins up MySQL, bootstraps Laravel, runs Pest.
name: 'Reusable Testing Matrix'

on:
  workflow_call:
    inputs:
      php-version:
        required: true
        type: string
      coverage:
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-suite:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: 'optiqueue_testing'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: optiqueue_testing
      DB_USERNAME: root
      DB_PASSWORD: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Bootstrap Application
        uses: ./.github/actions/setup-laravel
        with:
          php-version: ${{ inputs.php-version }}
          coverage: ${{ inputs.coverage && 'pcov' || 'none' }}

      - name: Get npm Cache Directory
        id: npm-cache
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm Dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Build Frontend Assets
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Run Tests
        if: ${{ !inputs.coverage }}
        run: php artisan test --parallel

      - name: Run Tests with Coverage
        if: ${{ inputs.coverage }}
        run: php artisan test --coverage-clover coverage.xml

      - name: Upload Coverage Report to Codecov
        if: ${{ inputs.coverage }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
